{{ $styles := resources.Get "css/custom.css" | minify }}
<link rel="stylesheet" href="{{ $styles.Permalink }}" media="screen">

<script async src="https://cdn.jsdelivr.net/npm/mathjax@4/tex-mml-chtml.js"></script>
<script>
    MathJax = {
        tex: {
            displayMath: [['\\[', '\\]']],
            inlineMath: [['\\(', '\\)']]
        },
        loader: {
            load: ['ui/safe']
        },
    };
</script>
